version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: contractiq_postgres
    environment:
      POSTGRES_DB: contractiq
      POSTGRES_USER: contractiq_user
      POSTGRES_PASSWORD: contractiq_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:6
    container_name: contractiq_mongo
    environment:
      MONGO_INITDB_DATABASE: contractiq_audit
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: contractiq_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: contractiq_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  mongo_data:
  minio_data: