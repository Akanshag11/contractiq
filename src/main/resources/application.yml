spring:
  application:
    name: contractiq

  datasource:
    url: jdbc:postgresql://localhost:5432/contractiq
    username: contractiq_user
    password: contractiq_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  data:
    mongodb:
      uri: mongodb://localhost:27017/contractiq_audit
      auto-index-creation: true
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: contractiq-group-v2
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.contractiq.kafka"
    listener:
      ack-mode: record

  batch:
    job:
      enabled: false        # don't run jobs on startup automatically
    jdbc:
      initialize-schema: always  # creates Spring Batch meta tables

app:
  jwt:
    secret: contractiq-super-secret-key-must-be-256-bits-long-for-hs256
    expiration-ms: 86400000   # 24 hours

  notifications:
    retry:
      max-attempts: 5
      fixed-delay-ms: 30000
      retry-delay-ms: 60000
      batch-size: 10

  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: contracts

logging:
  level:
    com.contractiq: DEBUG
    org.springframework.security: DEBUG
