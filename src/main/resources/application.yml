spring:
  application:
    name: contractiq

  datasource:
    url: jdbc:postgresql://localhost:5432/contractiq
    username: contractiq_user
    password: contractiq_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  data:
    mongodb:
      uri: mongodb://localhost:27017/contractiq_audit
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: contractiq-super-secret-key-must-be-256-bits-long-for-hs256
    expiration-ms: 86400000   # 24 hours

  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: contracts

logging:
  level:
    com.contractiq: DEBUG
    org.springframework.security: DEBUG